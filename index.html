<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: #2d2d2d; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; width: 90%; max-width: 900px; }
        .video-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 20px 0; }
        video { width: 100%; border-radius: 10px; background: #000; border: 2px solid #444; }
        .btn { padding: 15px 30px; font-size: 18px; cursor: pointer; border-radius: 50px; border: none; transition: 0.3s; font-weight: bold; }
        #startBtn { background: #28a745; color: white; }
        #stopBtn { background: #dc3545; color: white; display: none; }
        #countdown { position: absolute; font-size: 100px; color: #ffc107; z-index: 10; pointer-events: none; top: 40%; left: 50%; transform: translate(-50%, -50%); display: none; }
        input[type="file"] { margin-bottom: 20px; color: #ccc; }
    </style>
</head>
<body>

<div class="card">
    <h2>Student Duet Recorder</h2>
    <p>Upload your reference video, then press Start.</p>
    
    <input type="file" id="upload" accept="video/*">
    
    <div style="position: relative;">
        <div id="countdown">3</div>
        <div class="video-grid">
            <video id="refVideo"></video>
            <video id="webcam" autoplay muted playsinline></video>
        </div>
    </div>

    <button id="startBtn" class="btn">Start Recording</button>
    <button id="stopBtn" class="btn">Stop & Download</button>
</div>

<script>
    const refVideo = document.getElementById('refVideo');
    const webcam = document.getElementById('webcam');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const countdownEl = document.getElementById('countdown');

    let recorder;
    let chunks = [];

    document.getElementById('upload').onchange = (e) => {
        refVideo.src = URL.createObjectURL(e.target.files[0]);
    };

    startBtn.onclick = async () => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            webcam.srcObject = stream;
            
            startBtn.style.display = 'none';
            let count = 3;
            countdownEl.style.display = 'block';
            countdownEl.innerText = count;

            const timer = setInterval(() => {
                count--;
                if (count > 0) {
                    countdownEl.innerText = count;
                } else {
                    clearInterval(timer);
                    countdownEl.style.display = 'none';
                    
                    chunks = [];
                    recorder = new MediaRecorder(stream);
                    recorder.ondataavailable = e => chunks.push(e.data);
                    recorder.onstop = () => {
                        const blob = new Blob(chunks, { type: 'video/webm' });
                        const a = document.createElement('a');
                        a.href = URL.createObjectURL(blob);
                        a.download = "my_practice_session.webm";
                        a.click();
                    };
                    recorder.start();
                    refVideo.play();
                    stopBtn.style.display = 'inline-block';
                }
            }, 1000);
        } catch (e) {
            alert("Camera access denied. Please check your browser settings.");
        }
    };

    stopBtn.onclick = () => {
        recorder.stop();
        refVideo.pause();
        stopBtn.style.display = 'none';
        startBtn.style.display = 'inline-block';
    };
</script>
</body>
</html>
